name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-checks
          workspaces: ". -> target"

      # Everything runs inside the flake so tool versions match local hooks.
      - name: Rust format
        run: nix develop -c cargo fmt --check
      - name: Rust clippy
        run: nix develop -c cargo clippy --all-targets -- -D warnings
      - name: Rust tests (native)
        run: nix develop -c cargo test

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-build
          workspaces: ". -> target"

      # Use the web build:wasm script so the --out-dir (web/src/wasm) stays in
      # one place. Only needs wasm-pack/cargo — no pnpm install required.
      - name: WASM build
        run: nix develop -c bash -c "cd web && pnpm build:wasm"
      - name: Upload WASM bindings
        uses: actions/upload-artifact@v4
        with:
          name: wasm-bindings
          path: web/src/wasm

  wasm-browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-browser-tests
          workspaces: ". -> target"

      # WASM headless browser tests — CI only (too slow for git hooks).
      # Separate wasm-bindgen-test harness build, independent of wasm-build.
      - name: WASM tests
        run: nix develop -c wasm-pack test --headless --chrome crates/gql-core

  web-checks:
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Download WASM bindings
        uses: actions/download-artifact@v4
        with:
          name: wasm-bindings
          path: web/src/wasm

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(nix develop -c bash -c 'cd web && pnpm store path')" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Web install
        run: nix develop -c bash -c "cd web && pnpm install --frozen-lockfile"
      - name: Web lint
        run: nix develop -c bash -c "cd web && pnpm lint"
      - name: Web typecheck
        run: nix develop -c bash -c "cd web && pnpm tsc --noEmit"
      - name: Web tests
        run: nix develop -c bash -c "cd web && pnpm test run"

  e2e:
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Download WASM bindings
        uses: actions/download-artifact@v4
        with:
          name: wasm-bindings
          path: web/src/wasm

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(nix develop -c bash -c 'cd web && pnpm store path')" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Web install
        run: nix develop -c bash -c "cd web && pnpm install --frozen-lockfile"
      - name: Web e2e tests
        run: nix develop -c bash -c "cd web && pnpm e2e"
