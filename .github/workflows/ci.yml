name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-checks
          workspaces: ". -> target"

      - name: Rust format
        run: nix develop .#rust -c cargo fmt --check
      - name: Rust clippy
        run: nix develop .#rust -c cargo clippy --all-targets -- -D warnings
      - name: Rust tests (native)
        run: nix develop .#rust -c cargo test

  wasm-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-build
          workspaces: ". -> target"

      - name: WASM build
        run: nix develop .#rust -c bash -c "cd web && pnpm build:wasm"
      - name: Upload WASM bindings
        uses: actions/upload-artifact@v7
        with:
          name: wasm-bindings
          path: web/src/wasm

  wasm-browser-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-browser-tests
          workspaces: ". -> target"

      # WASM headless browser tests — CI only (too slow for git hooks).
      # Separate wasm-bindgen-test harness build, independent of wasm-build.
      - name: WASM tests
        run: nix develop .#wasm-test -c wasm-pack test --headless --chrome crates/gql-core

  web-checks:
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Download WASM bindings
        uses: actions/download-artifact@v8
        with:
          name: wasm-bindings
          path: web/src/wasm

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(nix develop .#web -c bash -c 'cd web && pnpm store path' | tail -n1)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Web install
        run: nix develop .#web -c bash -c "cd web && pnpm install --frozen-lockfile"
      - name: Web lint
        run: nix develop .#web -c bash -c "cd web && pnpm lint"
      - name: Web typecheck
        run: nix develop .#web -c bash -c "cd web && pnpm tsc --noEmit"
      - name: Web tests
        run: nix develop .#web -c bash -c "cd web && pnpm test run"

  e2e:
    needs: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Download WASM bindings
        uses: actions/download-artifact@v8
        with:
          name: wasm-bindings
          path: web/src/wasm

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(nix develop .#web -c bash -c 'cd web && pnpm store path' | tail -n1)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Web install
        run: nix develop .#web -c bash -c "cd web && pnpm install --frozen-lockfile"
      - name: Web e2e tests
        run: nix develop .#web -c bash -c "cd web && pnpm e2e"

  deploy:
    needs: [rust-checks, wasm-build, wasm-browser-tests, web-checks, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Required CLOUDFLARE_API_TOKEN permissions (create a custom token in the Cloudflare dashboard):
    #   - Cloudflare Pages: Edit          (deploy the Pages project)
    #   - D1: Edit                         (bind the D1 database to the Pages project)
    #   - Workers KV Storage: Edit         (bind the KV namespace to the Pages project)
    #   - Account Settings: Read           (resolve the account ID)
    # CLOUDFLARE_ACCOUNT_ID is your numeric Cloudflare account ID (not a secret per se,
    # but stored in GitHub secrets for convenience).
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Download WASM bindings
        uses: actions/download-artifact@v8
        with:
          name: wasm-bindings
          path: web/src/wasm

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(nix develop .#web -c bash -c 'cd web && pnpm store path' | tail -n1)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Web install
        run: nix develop .#web -c bash -c "cd web && pnpm install --frozen-lockfile"
      - name: Web build
        run: nix develop .#web -c bash -c "cd web && pnpm build"

      # Idempotent: fails (harmlessly) once the project already exists.
      - name: Ensure Cloudflare Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages project create gql-fiddle --production-branch=main

      # wrangler reads wrangler.toml from the repo root and picks up the
      # functions/ directory automatically — no extra flags needed.
      # D1 and KV bindings declared in wrangler.toml are uploaded with the deployment.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy web/dist --project-name=gql-fiddle --branch=main --commit-dirty=true

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: d1 migrations apply gql-fiddle-db --remote
