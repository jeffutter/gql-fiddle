# Git hooks. pre-commit is fast (staged files, formatting/lint/typecheck);
# pre-push runs the test suites including WASM headless-browser tests.
# All tools come from the Nix flake, so versions match CI exactly.

pre-commit:
  parallel: true
  commands:
    rust-fmt:
      glob: "*.rs"
      run: cargo fmt --check
    rust-clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets -- -D warnings
    web-format:
      root: "web/"
      glob: "*.{ts,tsx,css,json,html}"
      run: pnpm prettier --check {staged_files}
    web-lint:
      root: "web/"
      glob: "*.{ts,tsx}"
      run: pnpm eslint {staged_files}
    web-typecheck:
      root: "web/"
      glob: "*.{ts,tsx}"
      run: pnpm tsc --noEmit
    rust-test:
      run: cargo test
    web-test:
      root: "web/"
      run: pnpm test run

pre-push:
  parallel: true
  commands:
    rust-test:
      run: cargo test
    web-test:
      root: "web/"
      run: pnpm test run
    wasm-browser-test:
      glob: "crates/**/*.rs"
      run: wasm-pack test --headless --chrome crates/gql-core
