# pnpm 10+ blocks dependency build scripts by default; allow the ones our
# toolchain needs to produce their native binaries.
allowBuilds:
  "@swc/core": true
  better-sqlite3: true
  esbuild: true
  sharp: true
  workerd: true
patchedDependencies: { monaco-graphql@1.8.0: patches/monaco-graphql@1.8.0.patch }
